{% extends "admin/base.html" %}
{% load static %}

{% block title %}Karams CRM{% endblock %}

{% block extrastyle %}
{{ block.super }}
<link rel="icon" href="{% static 'img/favicon.ico' %}" sizes="32x32">
<link rel="icon" href="{% static 'img/favicon.svg' %}" type="image/svg+xml">
<link rel="apple-touch-icon" href="{% static 'img/apple-touch-icon.png' %}">
<link rel="stylesheet" href="{% static 'css/admin_karams.css' %}">
{% endblock %}

{% block branding %}
<div id="site-name">
  <a href="{% url 'admin:index' %}">
    <img src="{% static 'img/logo-karams-white.png' %}" alt="Karams" class="admin-logo">
    <span>Karams CRM</span>
  </a>
</div>
{% endblock %}

{% block nav-global %}
<a href="{% url 'core:dashboard' %}" class="admin-back-link">← Voltar ao CRM</a>
{{ block.super }}
{% endblock %}
