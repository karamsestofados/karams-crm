{% extends 'base.html' %}

{% block nav_atividade %}active{% endblock %}

{% block content %}
<div class="crm-page-header">
  <h1 class="crm-page-title">Cockpit Comercial</h1>
  <p class="page-subtitle">Rotina diária, calendário e histórico de interações</p>
</div>

<div id="cockpit-main">
  {% include 'relacionamento/partials/cockpit_main.html' %}
</div>

<div id="modal-interacao-global-container"></div>
<div id="modal-concluir-container"></div>
{% endblock %}

{% block extra_head %}
<script>
  document.body.addEventListener('htmx:beforeRequest', function(evt) {
    var el = evt.detail.elt;
    if (!el || !el.classList || !el.classList.contains('cockpit-cal-day')) return;
    document.querySelectorAll('.cockpit-cal-day.is-selected').forEach(function(day) {
      day.classList.remove('is-selected');
    });
    el.classList.add('is-selected');
  });

  document.body.addEventListener('htmx:afterSwap', function(evt) {
    if (evt.detail.target.id === 'modal-concluir-container') {
      var modal = document.getElementById('modal-concluir');
      if (modal) modal.classList.add('open');
    }
    if (evt.detail.target.id === 'modal-interacao-global-container') {
      var modalG = document.getElementById('modal-interacao-global');
      if (modalG) modalG.classList.add('open');
    }
  });
</script>
{% endblock %}
