<div class="cockpit-resumo-grid">
  <div class="cockpit-kpi">
    <span class="cockpit-kpi-value">{{ total_hoje }}</span>
    <span class="cockpit-kpi-label">Para Hoje</span>
  </div>
  <div class="cockpit-kpi cockpit-kpi--danger">
    <span class="cockpit-kpi-value">{{ total_atrasadas }}</span>
    <span class="cockpit-kpi-label">Atrasadas</span>
  </div>
  <div class="cockpit-kpi cockpit-kpi--warning">
    <span class="cockpit-kpi-value">{{ total_proximas }}</span>
    <span class="cockpit-kpi-label">Futuras</span>
  </div>
  <div class="cockpit-kpi">
    <span class="cockpit-kpi-value">{{ interacoes_hoje }}</span>
    <span class="cockpit-kpi-label">Interações Hoje</span>
  </div>
  <div class="cockpit-kpi">
    <span class="cockpit-kpi-value">{{ clientes_atendidos_hoje }}</span>
    <span class="cockpit-kpi-label">Clientes Atendidos</span>
  </div>
</div>
