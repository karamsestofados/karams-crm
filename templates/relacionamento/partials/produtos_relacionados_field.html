{% with config_id=field.auto_id|add:"-produtos-data" %}
<div class="produtos-relacionados-field"
     x-data="produtosRelacionadosField"
     data-busca-url="{% url 'produtos:busca' %}"
     data-field-name="{{ field.html_name }}"
     data-config-id="{{ config_id }}"
     @click.outside="fechar()"
     @keydown.escape.window="fechar()">
  {{ field.form.produtos_iniciais|json_script:config_id }}

  <label class="form-label" for="{{ field.id_for_label }}-busca">{{ field.label }}</label>

  <div class="produtos-chips produtos-chips-input" @click="$refs.busca.focus()">
    <template x-for="item in selecionados" :key="item.id">
      <span class="produto-chip is-removable">
        <span x-text="item.nome"></span>
        <button type="button" class="produto-chip-remove" @click.stop="remover(item.id)" aria-label="Remover produto">&times;</button>
      </span>
    </template>
    <svg class="produtos-chips-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text"
           id="{{ field.id_for_label }}-busca"
           class="produtos-chips-busca"
           x-ref="busca"
           x-model="busca"
           @input="onInput()"
           @keydown.backspace="removerUltimoSeNecessario()"
           @focus="if (busca.trim().length >= 2 && buscou) aberto = true"
           placeholder="Buscar e adicionar produtos..."
           autocomplete="off"
           role="combobox"
           :aria-expanded="aberto"
           aria-autocomplete="list">
  </div>

  <div class="produtos-chips-dropdown busca-clientes-dropdown"
       role="listbox"
       x-show="aberto"
       x-cloak>
    <template x-if="resultados.length">
      <template x-for="item in resultados" :key="item.id">
        <button type="button"
                class="busca-clientes-item produtos-chips-option"
                role="option"
                @mousedown.prevent="adicionar(item)">
          <span x-text="item.nome"></span>
        </button>
      </template>
    </template>
    <template x-if="buscou && !resultados.length && !buscando">
      <div class="busca-clientes-empty">Produto não encontrado</div>
    </template>
  </div>

  <template x-for="item in selecionados" :key="'hidden-' + item.id">
    <input type="hidden" :name="fieldName" :value="item.id">
  </template>

  {% if field.errors %}
  <span class="form-error">{{ field.errors.0 }}</span>
  {% endif %}
</div>
{% endwith %}
