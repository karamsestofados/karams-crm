{% if google_calendar_url %}
<div class="calendar-cta-banner" role="alert">
  <div class="calendar-cta-banner-text">
    <strong>Interação registrada com sucesso.</strong>
    <span>Adicione o compromisso ao seu Google Agenda — os dados já vêm preenchidos.</span>
  </div>
  <a href="{{ google_calendar_url }}"
     target="_blank"
     rel="noopener noreferrer"
     class="btn btn-primary calendar-cta-btn">
    Salvar no Google Agenda
  </a>
</div>
{% endif %}
