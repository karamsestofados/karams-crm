{% extends 'base.html' %}

{% block nav_usuarios %}active{% endblock %}

{% block content %}
<div class="main-content">
  <h1 class="page-title font-display">{{ titulo }}</h1>
  <p class="page-subtitle">Gerencie contas de acesso ao CRM</p>

  <div class="card">
    <form method="post">
      {% csrf_token %}
      {% for field in form %}
      <div class="form-group">
        <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}<span style="color:var(--danger); font-size:0.75rem;">{{ field.errors.0 }}</span>{% endif %}
      </div>
      {% endfor %}
      <div style="display:flex;gap:0.75rem;margin-top:1rem;">
        <button type="submit" class="btn btn-primary">Salvar</button>
        <a href="{% url 'accounts:usuarios_lista' %}" class="btn btn-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
