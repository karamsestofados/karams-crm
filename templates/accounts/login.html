{% extends 'base.html' %}
{% load static %}

{% block body %}
<div class="login-page">
  <div class="login-card">
    <img src="{% static 'img/logo-karams-white.png' %}" alt="Karams Estofados" class="logo-img-lg">
    <p class="login-subtitle">CRM de Vendas · Estofados de Alto Padrão</p>

    {% if form.errors %}
    <ul class="messages">
      <li class="message message-error">Usuário ou senha inválidos.</li>
    </ul>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label" for="id_username">Usuário</label>
        {{ form.username }}
      </div>
      <div class="form-group">
        <label class="form-label" for="id_password">Senha</label>
        {{ form.password }}
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%; margin-top:0.5rem;">
        Entrar
      </button>
    </form>
  </div>
</div>
{% endblock %}
